# @package data

defaults:
  - _self_

_target_: src.data.RobustAD_datamodule.RobustADDataModule

data_dir: ${paths.base_data_dir}/robustad

# One of: pcb, metal_parts, piled_bags
subset: pcb

# CIFAR-style experiments typically use 32x32
image_size: [64,64]

batch_size: 256
max_val_batches: -1

normalize: True

# Splits of source-domain normal (train split)
val_fraction: 0.1
test_fraction: 0.1

num_workers: 0
seed: ${seed}
