# @package _global_

defaults:
  - override /data: axov4
  - override /algorithm: vae
  - override /callbacks: default
  - override /trainer: cpu
  - override /evaluator: default
  - override /evaluator_callbacks: default
  - override /logger: mlflow

seed: 123
tags: ["axo_v4", "vae"]

experiment_name: axov4
run_name: ${short_hash:${hydra:runtime.output_dir},12}

data:
  batch_size: 16384
  max_val_batches: 10

trainer:
  gradient_clip_algorithm: norm
  gradient_clip_val: 0.0
  min_epochs: 1
  max_epochs: 20

test: true

algorithm:
  features: null
  encoder:
    in_dim: 57
    nodes: [28, 16]
    out_dim: 8

    init_weight:
      _target_: src.utils.hydra.get_method
      path: torch.nn.init.xavier_uniform_
    init_bias:
      _target_: src.utils.hydra.get_method
      path: torch.nn.init.zeros_

  decoder:
    nodes: [24, 32, 64, 128]

    init_weight:
      _target_: src.utils.hydra.get_method
      path: torch.nn.init.xavier_uniform_
    init_bias:
      _target_: src.utils.hydra.get_method
      path: torch.nn.init.zeros_
    init_last_weight:
      _target_: src.utils.hydra.get_method
      path: torch.nn.init.uniform_
      a: -0.05
      b: 0.05
    init_last_bias: null

  kl_warmup_frac: 0.0
  mask: false


  loss:
    _target_: src.algorithms.losses.vae.AxoV4Loss
    reco_scale: 1.0
    kl_scale: 0.5736625791372814

  optimizer:
    _partial_: true
    _target_: src.algorithms.optimizers.lion.Lion
    lr: 0.001
    weight_decay: 0.0

  scheduler:
    scheduler:
      _partial_: true
      _target_: src.algorithms.schedulers.cdrw.CDRW
      lr0: ${algorithm.optimizer.lr}
      s0: 32
      t_mul: 2.0
      m_mul: 0.65
      alpha: 1e-6
      warmup_epochs: 10

callbacks:
  log_data_mlflow: null
  anomaly_eff:
    _target_: src.callbacks.rate.AnomalyEfficiencyCallback
    metric_name: 'loss/z_mean_squared/full'
    target_rates: [0.25]
    bc_rate: 28608.8064

  max_rate_kl_ckpt:
    _target_: src.callbacks.model_checkpoint.SingleDatasetModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}'
    monitor: eff__ascore_loss_z_mean_squared_full__brate_0.25kHz
    criterion:
      _target_: src.callbacks.checkpointing.criterion.Max
      top_k: 1
    ds:
      - GluGluHToBB_M-125
      - GluGluHToGG_M-125
      - GluGluHToGG_M-90
      - GluGluHToTauTau_M-125
      - GluGlutoHHto2B2WtoLNu2Q_kl-1p00_kt-1p00_c2-0p00
      - HHHTo6B_c3_0_d4_0
      - HHHto4B2Tau_c3-0_d4-0
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-100000mm
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-10000mm
      - HTo2LongLivedTo4b_MH-125_MFF-12_CTau-900mm
      - HTo2LongLivedTo4b_MH-125_MFF-25_CTau-1500mm
      - HTo2LongLivedTo4b_MH-125_MFF-50_CTau-3000mm
      - SMS-Higgsino_mN2-170_mC1-160_mN1-150_HT60
      - SUSYGluGluToBBHToBB_NarrowWidth_M-1200
      - SUSYGluGluToBBHToBB_NarrowWidth_M-600
      - SUSYGluGluToBBHToBB_NarrowWidth_M-350
      - SUSYGluGluToBBHToBB_NarrowWidth_M-120
      - VBFHToCC_M-125
      - VBFHToInvisible_M-125
      - VBFHToTauTau_M125
      - VBFHto2B_M-125
      - WToTauTo3Mu
      - WToTauToMuMuMu
      - Wlnu
      - ggXToJpsiJpsiTo2Mu2E_m7_pseudoscalar
      - ggXToYYTo2Mu2E_m14_pseudoscalar
      - ggXToYYTo2Mu2E_m18_pseudoscalar
      - ggXToYYTo2Mu2E_m26_pseudoscalar
      - haa-4b-ma15
      - ttHto2B_M-125
      - ttHto2C_M-125

  stable_mse_ckpt:
    _target_: src.callbacks.model_checkpoint.SingleDatasetModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}'
    monitor: loss_reco_mean_top_vals
    criterion:
      _target_: src.callbacks.checkpointing.criterion.Stable
      top_k: 1
      threshold: 0.05
      patience: 10
    ds:
      - main_val

  cvar25_ema_ckpt:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}/summary/cvar25_ema/max'
    monitor: 'val/summary/eff_cvar25_ema'
    filename: 'cvar25_ema'
    save_last: false
    save_top_k: 1
    mode: "max"
    auto_insert_metric_name: False
    save_weights_only: False
    every_n_epochs: 1
    save_on_train_epoch_end: false

evaluator:
  ckpts:
    last: true
    summary:
      cvar25_ema: ['max']
    single:
      loss_reco_mean_top_vals: ['stable']
      eff__ascore_loss_z_mean_squared_full__brate_0.25kHz: ['max']

evaluator_callbacks:
  anomaly_efficiency:
    _target_: src.evaluation.callbacks.efficiency.AnomalyEfficiencyCallback
    name: eff_ascore_z_mean_squared
    metric_name: 'loss/z_mean_squared/full'
    target_rates: [0.25]
    bc_rate: 28608.8064
    ds:
      - GluGluHToBB_M-125
      - GluGluHToGG_M-125
      - GluGluHToGG_M-90
      - GluGluHToTauTau_M-125
      - GluGlutoHHto2B2WtoLNu2Q_kl-1p00_kt-1p00_c2-0p00
      - HHHTo6B_c3_0_d4_0
      - HHHto4B2Tau_c3-0_d4-0
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-100000mm
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-10000mm
      - HTo2LongLivedTo4b_MH-125_MFF-12_CTau-900mm
      - HTo2LongLivedTo4b_MH-125_MFF-25_CTau-1500mm
      - HTo2LongLivedTo4b_MH-125_MFF-50_CTau-3000mm
      - SMS-Higgsino_mN2-170_mC1-160_mN1-150_HT60
      - SUSYGluGluToBBHToBB_NarrowWidth_M-1200
      - SUSYGluGluToBBHToBB_NarrowWidth_M-600
      - SUSYGluGluToBBHToBB_NarrowWidth_M-350
      - SUSYGluGluToBBHToBB_NarrowWidth_M-120
      - VBFHToCC_M-125
      - VBFHToInvisible_M-125
      - VBFHToTauTau_M125
      - VBFHto2B_M-125
      - WToTauTo3Mu
      - WToTauToMuMuMu
      - Wlnu
      - ggXToJpsiJpsiTo2Mu2E_m7_pseudoscalar
      - ggXToYYTo2Mu2E_m14_pseudoscalar
      - ggXToYYTo2Mu2E_m18_pseudoscalar
      - ggXToYYTo2Mu2E_m26_pseudoscalar
      - haa-4b-ma15
      - ttHto2B_M-125
      - ttHto2C_M-125
    log_raw_mlflow: false

  loss:
    _target_: src.evaluation.callbacks.loss.LossCallback
    name: mse_mean_top_vals
    loss_name: 'loss/reco/mean_top_vals'
    ds:
      - main_test
      - GluGluHToBB_M-125
      - GluGluHToGG_M-125
      - GluGluHToGG_M-90
      - GluGluHToTauTau_M-125
      - GluGlutoHHto2B2WtoLNu2Q_kl-1p00_kt-1p00_c2-0p00
      - HHHTo6B_c3_0_d4_0
      - HHHto4B2Tau_c3-0_d4-0
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-100000mm
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-10000mm
      - HTo2LongLivedTo4b_MH-125_MFF-12_CTau-900mm
      - HTo2LongLivedTo4b_MH-125_MFF-25_CTau-1500mm
      - HTo2LongLivedTo4b_MH-125_MFF-50_CTau-3000mm
      - SMS-Higgsino_mN2-170_mC1-160_mN1-150_HT60
      - SUSYGluGluToBBHToBB_NarrowWidth_M-1200
      - SUSYGluGluToBBHToBB_NarrowWidth_M-600
      - SUSYGluGluToBBHToBB_NarrowWidth_M-350
      - SUSYGluGluToBBHToBB_NarrowWidth_M-120
      - VBFHToCC_M-125
      - VBFHToInvisible_M-125
      - VBFHToTauTau_M125
      - VBFHto2B_M-125
      - WToTauTo3Mu
      - WToTauToMuMuMu
      - Wlnu
      - ggXToJpsiJpsiTo2Mu2E_m7_pseudoscalar
      - ggXToYYTo2Mu2E_m14_pseudoscalar
      - ggXToYYTo2Mu2E_m18_pseudoscalar
      - ggXToYYTo2Mu2E_m26_pseudoscalar
      - haa-4b-ma15
      - ttHto2B_M-125
      - ttHto2C_M-125
    log_raw_mlflow: false

  reco:
    _target_: src.evaluation.callbacks.reco.ReconstructionPlots
    warmup_batches: 0.2
    output_name: reconstructed_data
    datamodule: true
    ckpts:
      last: true
    datasets:
      - 'main_test'
      - 'SingleNeutrino_E-10-gun'
    name: 'reco'
    log_raw_mlflow: false

  ascore_plot:
    _target_: src.evaluation.callbacks.output.HistogramOutputCallback
    output_name: loss/z_mean_squared/full
    ds:
      - GluGluHToBB_M-125
      - GluGluHToGG_M-125
      - GluGluHToGG_M-90
      - GluGluHToTauTau_M-125
      - GluGlutoHHto2B2WtoLNu2Q_kl-1p00_kt-1p00_c2-0p00
      - HHHTo6B_c3_0_d4_0
      - HHHto4B2Tau_c3-0_d4-0
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-100000mm
      - HTo2LongLivedTo4b_MH-1000_MFF-450_CTau-10000mm
      - HTo2LongLivedTo4b_MH-125_MFF-12_CTau-900mm
      - HTo2LongLivedTo4b_MH-125_MFF-25_CTau-1500mm
      - HTo2LongLivedTo4b_MH-125_MFF-50_CTau-3000mm
      - SMS-Higgsino_mN2-170_mC1-160_mN1-150_HT60
      - SUSYGluGluToBBHToBB_NarrowWidth_M-1200
      - SUSYGluGluToBBHToBB_NarrowWidth_M-600
      - SUSYGluGluToBBHToBB_NarrowWidth_M-350
      - SUSYGluGluToBBHToBB_NarrowWidth_M-120
      - VBFHToCC_M-125
      - VBFHToInvisible_M-125
      - VBFHToTauTau_M125
      - VBFHto2B_M-125
      - WToTauTo3Mu
      - WToTauToMuMuMu
      - Wlnu
      - ggXToJpsiJpsiTo2Mu2E_m7_pseudoscalar
      - ggXToYYTo2Mu2E_m14_pseudoscalar
      - ggXToYYTo2Mu2E_m18_pseudoscalar
      - ggXToYYTo2Mu2E_m26_pseudoscalar
      - haa-4b-ma15
      - ttHto2B_M-125
      - ttHto2C_M-125
    ckpts:
      last: true
    bins: 20
    warmup_batches: 0.2
    log: true
    name: z_mean_squared_histograms
    log_raw_mlflow: false
