# @package _global_

defaults:
  - override /data: basis
  - override /algorithm: realnvp
  - override /callbacks: default
  - override /trainer: cpu
  - override /evaluator: default
  - override /evaluator_callbacks: default
  - override /logger: mlflow

seed: 123
tags: ["realnvp", "signal"]

experiment_name: realnvp_models
run_name: ${short_hash:${hydra:runtime.output_dir},12}

data:
  batch_size: 16384
  max_val_batches: 10

trainer:
  gradient_clip_algorithm: norm
  gradient_clip_val: 0.0
  min_epochs: 1
  max_epochs: 200

test: true

# Metrics to report for each checkpoint.
optimized_metric_config:
  main_metric:
    callback:
      name: eff
      params:
        target_rate: 0.25
    direction: maximize
  sec_metric:
    callback:
      name: nll_mean_top_vals
      params:
        ckpt_name: null # This will be filled in with the best ckpt of the main metric.
        test_ds: normal
    direction: minimize


algorithm:
  # The basis data processing returns 117 features.
  operational_rate: 0.25

  optimizer:
    _partial_: true
    _target_: torch.optim.AdamW
    lr: 0.0013029941778430407
    weight_decay: 0.001
    betas: [0.9, 0.999]
    eps: 1e-8


callbacks:
  log_data_mlflow: null

  anomaly_eff:
    _target_: src.callbacks.efficiency.AnomalyEfficiencyCallback
    metric_name: 'loss/nll/full'
    target_rates: [0.25]
    bc_rate: 28608.8064

  max_rate_nll_ckpt:
    _target_: src.callbacks.model_checkpoint.SingleDatasetModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}'
    monitor: eff__ascore_loss_nll_full__brate_0_25kHz
    criterion:
      _target_: src.callbacks.checkpointing.criterion.Max
      top_k: 1
    ds:
      - GluGluHTo2B_Par-MH-125
      - GluGluHto2G_Par-MH-125
      - GluGluHto2G_Par-MH-90
      - GluGluHto2Tau_Par-MH-125
      - GluGlutoHHto2B2WtoLNu2Q_Par-c2-0-kl-1-kt-1
      - HHHto4B2Tau_Par-c3-0-d4-0
      - HHHto6B_Par-c3-0-d4-0
      - SUSYGluGluToBBHTo2B_Par-M-1200
      - SUSYGluGluToBBHToBB_Par-M-120
      - SUSYGluGluToBBHToBB_Par-M-350
      - SUSYGluGluToBBHToBB_Par-M-600
      - TTHTo2C_Par-MH-125
      - TTHto2B_Par-MH-125
      - VBFHTo2C_Par-MH-125
      - VBFHto2B_Par-MH-125
      - VBFHto2Tau_Par-MH-125
      - WtoTauto3Mu
      - ggH-suep-decay
      - smj-case-A
      - haa-4b-ma15

  stable_nll_ckpt:
    _target_: src.callbacks.model_checkpoint.SingleDatasetModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}'
    monitor: loss_nll_mean_top_vals
    criterion:
      _target_: src.callbacks.checkpointing.criterion.Stable
      top_k: 1
      threshold: 0.05
      patience: 10
    ds:
      - normal

  stable_nll_q99_ckpt:
    _target_: src.callbacks.model_checkpoint.SingleDatasetModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}'
    monitor: loss_nll_q99
    criterion:
      _target_: src.callbacks.checkpointing.criterion.Stable
      top_k: 1
      threshold: 0.05
      patience: 10
    ds:
      - normal

  cvar25_ema_ckpt:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}/summary/cvar25_ema/max'
    monitor: 'val/summary/eff_cvar25_ema'
    filename: 'cvar25_ema'
    save_last: false
    save_top_k: 1
    mode: "max"
    auto_insert_metric_name: False
    save_weights_only: False
    every_n_epochs: 1
    save_on_train_epoch_end: false

  cvar10_ema_ckpt:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}/summary/cvar10_ema/max'
    monitor: 'val/summary/eff_cvar10_ema'
    filename: 'cvar10_ema'
    save_last: false
    save_top_k: 1
    mode: "max"
    auto_insert_metric_name: False
    save_weights_only: False
    every_n_epochs: 1
    save_on_train_epoch_end: false


evaluator:
  ckpts:
    last: true
    summary:
      cvar25_ema: ['max']
      cvar10_ema: ['max']
    single:
      loss_nll_mean_top_vals: ['stable']
      loss_nll_q99: ['stable']
      eff__ascore_loss_nll_full__brate_0_25kHz: ['max']


evaluator_callbacks:
  anomaly_efficiency:
    _target_: src.evaluation.callbacks.efficiency.AnomalyEfficiencyCallback
    metric_name: 'loss/nll/full'
    target_rates: [0.25]
    bc_rate: 28608.8064
    ds:
      - GluGluHTo2B_Par-MH-125
      - GluGluHto2G_Par-MH-125
      - GluGluHto2G_Par-MH-90
      - GluGluHto2Tau_Par-MH-125
      - GluGlutoHHto2B2WtoLNu2Q_Par-c2-0-kl-1-kt-1
      - HHHto4B2Tau_Par-c3-0-d4-0
      - HHHto6B_Par-c3-0-d4-0
      - SUSYGluGluToBBHTo2B_Par-M-1200
      - SUSYGluGluToBBHToBB_Par-M-120
      - SUSYGluGluToBBHToBB_Par-M-350
      - SUSYGluGluToBBHToBB_Par-M-600
      - TTHTo2C_Par-MH-125
      - TTHto2B_Par-MH-125
      - VBFHTo2C_Par-MH-125
      - VBFHto2B_Par-MH-125
      - VBFHto2Tau_Par-MH-125
      - WtoTauto3Mu
      - ggH-suep-decay
      - smj-case-A
      - haa-4b-ma15
    cvar_summary: 0.25
    log_raw_mlflow: false

  nll_operational_mean:
    _target_: src.evaluation.callbacks.output.OutputCallback
    name: nll_mean_top_vals
    loss_name: 'loss/nll/mean_top_vals'
    ds:
      - normal
      - GluGluHTo2B_Par-MH-125
      - GluGluHto2G_Par-MH-125
      - GluGluHto2G_Par-MH-90
      - GluGluHto2Tau_Par-MH-125
      - GluGlutoHHto2B2WtoLNu2Q_Par-c2-0-kl-1-kt-1
      - HHHto4B2Tau_Par-c3-0-d4-0
      - HHHto6B_Par-c3-0-d4-0
      - SUSYGluGluToBBHTo2B_Par-M-1200
      - SUSYGluGluToBBHToBB_Par-M-120
      - SUSYGluGluToBBHToBB_Par-M-350
      - SUSYGluGluToBBHToBB_Par-M-600
      - TTHTo2C_Par-MH-125
      - TTHto2B_Par-MH-125
      - VBFHTo2C_Par-MH-125
      - VBFHto2B_Par-MH-125
      - VBFHto2Tau_Par-MH-125
      - WtoTauto3Mu
      - ggH-suep-decay
      - smj-case-A
      - haa-4b-ma15
    log_raw_mlflow: false

  nll_loss_q99:
    _target_: src.evaluation.callbacks.output.OutputCallback
    name: nll_q99
    loss_name: 'loss/nll/q99'
    ds:
      - normal
      - GluGluHTo2B_Par-MH-125
      - GluGluHto2G_Par-MH-125
      - GluGluHto2G_Par-MH-90
      - GluGluHto2Tau_Par-MH-125
      - GluGlutoHHto2B2WtoLNu2Q_Par-c2-0-kl-1-kt-1
      - HHHto4B2Tau_Par-c3-0-d4-0
      - HHHto6B_Par-c3-0-d4-0
      - SUSYGluGluToBBHTo2B_Par-M-1200
      - SUSYGluGluToBBHToBB_Par-M-120
      - SUSYGluGluToBBHToBB_Par-M-350
      - SUSYGluGluToBBHToBB_Par-M-600
      - TTHTo2C_Par-MH-125
      - TTHto2B_Par-MH-125
      - VBFHTo2C_Par-MH-125
      - VBFHto2B_Par-MH-125
      - VBFHto2Tau_Par-MH-125
      - WtoTauto3Mu
      - ggH-suep-decay
      - smj-case-A
      - haa-4b-ma15
    log_raw_mlflow: false

  thres_drift:
    _target_: src.evaluation.callbacks.thres_drift.ThresholdDriftCallback
    loss_name: 'loss/nll/full'
    target_rates: [0.25]
    bc_rate: 28608.8064
    calibration_fraction: 0.5
    split_seed: 12345
    log_raw_mlflow: false
    name: thres_drift

  wasserstein:
    _target_: src.evaluation.callbacks.wasserstein.Wasserstein
    metric_name: 'loss/nll/full'
    dataset_1: normal
    dataset_2: SingleNeutrino_E-10-gun
    apply_log1p: true
    log_raw_mlflow: false
    name: wasserstein
