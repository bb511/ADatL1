# @package _global_

defaults:
  - override /data: basis
  - override /algorithm: vicreg
  - override /callbacks: default
  - override /trainer: cpu
  - override /evaluator: default
  - override /evaluator_callbacks: default
  - override /logger: mlflow

tags: ["vicreg", "agnostic"]

experiment_name: vicreg_agnostic_training
run_name: ${short_hash:${hydra:runtime.output_dir},12}

seed: 12345

data:
  batch_size: 16384
  max_val_batches: 10

trainer:
  gradient_clip_algorithm: norm
  gradient_clip_val: 0.0
  min_epochs: 1
  max_epochs: 200

test: true

algorithm:
  diagnosis_metrics: false
  model:
    in_dim: 117

  optimizer:
    _partial_: true
    _target_: torch.optim.AdamW
    lr: 0.0013029941778430407
    weight_decay: 0.001
    betas: [0.9, 0.999]
    eps: 1e-8

  scheduler:
    # here other attributes...
    scheduler:
      _target_: src.algorithms.schedulers.cdw.CosineWithWarmup
      _partial_: true
      warmup_ratio: 0.1
      min_lr_ratio: 0.05
      warmup_start_ratio: 1e-3


callbacks:
  log_data_mlflow: null
  # Additional checkpoints for the final run (expensive).
  knn_rates:
    _target_: src.callbacks.knn_rate.KNNRate
    output_name: 'vicreg_rep_data'
    reference_sample_size: 40_000
    bkg_sample_size: 500_000
    target_rates: [0.25]
    bc_rate: 28608.8064
    k: 50

  stable_loss_ckpt:
    _target_: src.callbacks.model_checkpoint.SingleDatasetModelCheckpoint
    dirpath: '${paths.checkpoints_dir}/${experiment_name}/${run_name}'
    monitor: loss
    criterion:
      _target_: src.callbacks.checkpointing.criterion.Stable
      top_k: 1
      threshold: 0.05
      patience: 10
    ds:
      - main_val

evaluator:
  ckpts:
    last: true
    single:
      loss: ['stable']

evaluator_callbacks:
  loss:
    _target_: src.evaluation.callbacks.loss.LossCallback
    name: loss
    loss_name: 'loss'
    log_raw_mlflow: false
    ds:
      - main_test
      - SingleNeutrino_E-10-gun

  eff_rank:
    _target_: src.evaluation.callbacks.loss.LossCallback
    name: eff_rank
    loss_name: 'effective_rank'
    log_raw_mlflow: false
    ds:
      - main_test
      - SingleNeutrino_E-10-gun

  knn_effs:
    _target_: src.evaluation.callbacks.knn_effs.KNNEffs
    name: knn_effs
    output_name: 'vicreg_rep_data'
    reference_sample_size: 40_000
    bkg_sample_size: 500_000
    bc_rate: 28608.8064
    target_rates: [0.25]
    ds:
      - main_test
      - GluGluHTo2B_Par-MH-125
      - GluGluHto2G_Par-MH-125
      - GluGluHto2G_Par-MH-90
      - GluGluHto2Tau_Par-MH-125
      - GluGlutoHHto2B2WtoLNu2Q_Par-c2-0-kl-1-kt-1
      - HHHto4B2Tau_Par-c3-0-d4-0
      - HHHto6B_Par-c3-0-d4-0
      - SUSYGluGluToBBHTo2B_Par-M-1200
      - SUSYGluGluToBBHToBB_Par-M-120
      - SUSYGluGluToBBHToBB_Par-M-350
      - SUSYGluGluToBBHToBB_Par-M-600
      - TTHTo2C_Par-MH-125
      - TTHto2B_Par-MH-125
      - VBFHTo2C_Par-MH-125
      - VBFHto2B_Par-MH-125
      - VBFHto2Tau_Par-MH-125
      - WtoTauto3Mu
      - ggH-suep-decay
      - smj-case-A
      - haa-4b-ma15

    k: 50
    log_raw_mlflow: false
